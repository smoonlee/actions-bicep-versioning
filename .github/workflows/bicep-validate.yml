name: "Bicep Validate"

on:
  pull_request:
    branches:
      - main
    paths:
      - "infra/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: "Bicep Build & Lint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Bicep CLI
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep
          sudo mv bicep /usr/local/bin/bicep
          bicep --version

      - name: Bicep Build
        run: bicep build infra/main.bicep --stdout > /dev/null

      - name: Bicep Lint
        run: bicep lint infra/main.bicep

      - name: Post validation comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const marker = '<!-- bicep-validate-comment -->';
            const existing = comments.find(c => c.body.includes(marker));
            const body = [
              marker,
              '## Bicep Validation Passed',
              '',
              '| Check | Status |',
              '|-------|--------|',
              '| Bicep Build | Passed |',
              '| Bicep Lint | Passed |',
              '',
              `Validated at \`${new Date().toISOString()}\` by [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`
            ].join('\n');
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
