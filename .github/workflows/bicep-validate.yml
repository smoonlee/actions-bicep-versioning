name: "Bicep Validate"

on:
  pull_request:
    branches:
      - main
    paths:
      - "infra/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: "Bicep Build & Lint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.0

      - name: Install Bicep CLI
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep
          sudo mv bicep /usr/local/bin/bicep
          bicep --version

      - name: Bicep Build
        id: bicep-build
        continue-on-error: true
        run: |
          > build_errors.txt
          for f in $(find infra/ -name '*.bicep' -not -name '*.bicepparam' | sort); do
            bicep build "$f" --stdout > /dev/null 2>> build_errors.txt || true
          done
          [ ! -s build_errors.txt ]

      - name: Bicep Lint
        id: bicep-lint
        continue-on-error: true
        run: |
          > lint_errors.txt
          for f in $(find infra/ -name '*.bicep' -not -name '*.bicepparam' | sort); do
            bicep lint "$f" 2>> lint_errors.txt || true
          done
          [ ! -s lint_errors.txt ]

      - name: Capture validation results
        id: validation
        run: |
          BUILD_STATUS="${{ steps.bicep-build.outcome }}"
          LINT_STATUS="${{ steps.bicep-lint.outcome }}"

          BUILD_ERRORS=""
          if [ -f build_errors.txt ] && [ -s build_errors.txt ]; then
            BUILD_ERRORS=$(cat build_errors.txt)
          fi

          LINT_ERRORS=""
          if [ -f lint_errors.txt ] && [ -s lint_errors.txt ]; then
            LINT_ERRORS=$(cat lint_errors.txt)
          fi

          if [ "$BUILD_STATUS" = "success" ] && [ "$LINT_STATUS" = "success" ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi

          {
            echo 'build_errors<<EOF'
            echo "$BUILD_ERRORS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          {
            echo 'lint_errors<<EOF'
            echo "$LINT_ERRORS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          echo "build_status=$BUILD_STATUS" >> "$GITHUB_OUTPUT"
          echo "lint_status=$LINT_STATUS" >> "$GITHUB_OUTPUT"

          # Map error line numbers to module names (across all files)
          AFFECTED_MODULES=""
          if [ -f build_errors.txt ] || [ -f lint_errors.txt ]; then
            for BICEP_FILE in $(find infra/ -name '*.bicep' -not -name '*.bicepparam'); do
              FILE_ERRORS=$(grep "$BICEP_FILE" build_errors.txt lint_errors.txt 2>/dev/null || true)
              ERROR_LINES=$(echo "$FILE_ERRORS" | grep -ohP '\(\d+,' | grep -oP '\d+' | sort -un)
              MODULE_STARTS=$(grep -n '^module ' "$BICEP_FILE" 2>/dev/null | sed 's/:module \([^ ]*\).*/:\1/')

              for ERR_LINE in $ERROR_LINES; do
                [ -z "$ERR_LINE" ] && continue
                MATCHED_MODULE=""
                MATCHED_START=0
                while IFS=: read -r MOD_LINE MOD_NAME; do
                  if [ "$ERR_LINE" -ge "$MOD_LINE" ] && [ "$MOD_LINE" -ge "$MATCHED_START" ]; then
                    MATCHED_MODULE="$MOD_NAME"
                    MATCHED_START=$MOD_LINE
                  fi
              done <<< "$MODULE_STARTS"
              if [ -n "$MATCHED_MODULE" ]; then
                AFFECTED_MODULES="$AFFECTED_MODULES $MATCHED_MODULE"
              fi
            done
            done
            AFFECTED_MODULES=$(echo "$AFFECTED_MODULES" | tr ' ' '\n' | sort -u | grep -v '^$' | tr '\n' ',' | sed 's/,$//')
          fi
          echo "affected_modules=$AFFECTED_MODULES" >> "$GITHUB_OUTPUT"

      - name: Post validation comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const result = '${{ steps.validation.outputs.result }}';
            const buildStatus = '${{ steps.validation.outputs.build_status }}';
            const lintStatus = '${{ steps.validation.outputs.lint_status }}';

            const affectedModules = '${{ steps.validation.outputs.affected_modules }}';

            // Strip runner workspace path prefix for cleaner output
            const stripPath = (s) => s.replace(/\/home\/runner\/work\/[^/]+\/[^/]+\//g, '');

            let buildErrors = '';
            try { buildErrors = stripPath(fs.readFileSync('build_errors.txt', 'utf8').trim()); } catch {}
            let lintErrors = '';
            try { lintErrors = stripPath(fs.readFileSync('lint_errors.txt', 'utf8').trim()); } catch {}

            const buildIcon = buildStatus === 'success' ? 'Passed' : 'Failed';
            const lintIcon = lintStatus === 'success' ? 'Passed' : 'Failed';
            const heading = result === 'success'
              ? '## Bicep Validation Passed'
              : '## Bicep Validation Failed — Manual Intervention Required';

            const lines = [
              '<!-- bicep-validate-comment -->',
              heading,
              '',
              '| Check | Status |',
              '|-------|--------|',
              `| Bicep Build | ${buildIcon} |`,
              `| Bicep Lint | ${lintIcon} |`,
            ];

            if (affectedModules && result !== 'success') {
              const modules = affectedModules.split(',');
              lines.push('', '### Affected Modules', '');
              modules.forEach(m => lines.push(`- \`${m}\``));
            }

            if (buildErrors) {
              lines.push('', '### Build Errors', '', '```', buildErrors, '```');
            }
            if (lintErrors) {
              lines.push('', '### Lint Warnings / Errors', '', '```', lintErrors, '```');
            }
            if (result !== 'success') {
              lines.push('', '> **Note:** The Bicep files have errors that need to be resolved before this PR can be merged.');
            }

            lines.push('', `Validated at \`${new Date().toISOString()}\` by [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`);

            const body = lines.join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const marker = '<!-- bicep-validate-comment -->';
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

      - name: Fail workflow if validation failed
        if: steps.validation.outputs.result == 'failure'
        run: exit 1
