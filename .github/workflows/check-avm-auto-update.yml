name: "Check AVM Module Auto-Update"

on:
  workflow_dispatch:
  # Uncomment when ready to replace the manual check-avm-updates workflow:
  # schedule:
  #   - cron: "0 8 * * 1" # Every Monday at 08:00 UTC

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  auto-update:
    name: "Auto-Update AVM Modules"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for AVM module updates
        id: check
        run: |
          set -e
          TABLE_FILE=$(mktemp)
          SKIP_FILE=$(mktemp)
          UPDATES_LIST="$RUNNER_TEMP/module_updates.txt"
          > "$UPDATES_LIST"
          UPDATES_FOUND=false
          CURRENT_FILE=""

          # ── Helper: compare two semver strings ──
          # Returns 0 if $1 > $2, 1 otherwise
          semver_gt() {
            local IFS=.
            local i a=($1) b=($2)
            for ((i=0; i<3; i++)); do
              [ "${a[i]:-0}" -gt "${b[i]:-0}" ] && return 0
              [ "${a[i]:-0}" -lt "${b[i]:-0}" ] && return 1
            done
            return 1  # equal
          }

          while IFS= read -r match; do
            file=$(echo "$match" | cut -d: -f1)
            content=$(echo "$match" | cut -d: -f3-)

            MODULE_REF=$(echo "$content" | grep -oP "br/public:avm/[^'\"]+")
            if [ -z "$MODULE_REF" ]; then continue; fi

            MODULE_PATH=$(echo "$MODULE_REF" | rev | cut -d: -f2- | rev | sed 's|br/public:||')
            CURRENT_VERSION=$(echo "$MODULE_REF" | rev | cut -d: -f1 | rev)

            REGISTRY_PATH="bicep/${MODULE_PATH}"
            echo "Checking ${REGISTRY_PATH} (current: ${CURRENT_VERSION})"

            # ── Cross-check 1: Validate current version is valid semver ──
            if ! echo "$CURRENT_VERSION" | grep -qP '^\d+\.\d+\.\d+$'; then
              echo "  SKIP: Current version '${CURRENT_VERSION}' is not valid semver"
              echo "| \`${MODULE_PATH}\` | \`${CURRENT_VERSION}\` | Skipped — invalid current version |" >> "$SKIP_FILE"
              continue
            fi

            # ── Fetch available tags from MCR ──
            TAGS_JSON=$(curl -sf "https://mcr.microsoft.com/v2/${REGISTRY_PATH}/tags/list" 2>/dev/null || echo "")
            if [ -z "$TAGS_JSON" ]; then
              echo "  SKIP: Could not fetch tags for ${REGISTRY_PATH}"
              echo "| \`${MODULE_PATH}\` | \`${CURRENT_VERSION}\` | Skipped — registry unreachable |" >> "$SKIP_FILE"
              continue
            fi

            # ── Cross-check 2: Filter to stable semver tags only (no pre-release) ──
            STABLE_TAGS=$(echo "$TAGS_JSON" | jq -r '.tags[]' | grep -P '^\d+\.\d+\.\d+$' || true)
            if [ -z "$STABLE_TAGS" ]; then
              echo "  SKIP: No stable release tags found for ${REGISTRY_PATH}"
              echo "| \`${MODULE_PATH}\` | \`${CURRENT_VERSION}\` | Skipped — no stable tags |" >> "$SKIP_FILE"
              continue
            fi

            LATEST_VERSION=$(echo "$STABLE_TAGS" | sort -V | tail -n 1)
            echo "  Latest stable: ${LATEST_VERSION}"

            # ── Cross-check 3: Ensure it's actually newer (not a downgrade) ──
            if [ "$CURRENT_VERSION" = "$LATEST_VERSION" ]; then
              echo "  Already on latest"
              continue
            fi
            if ! semver_gt "$LATEST_VERSION" "$CURRENT_VERSION"; then
              echo "  SKIP: Latest '${LATEST_VERSION}' is not newer than current '${CURRENT_VERSION}'"
              continue
            fi

            # ── Cross-check 4: Verify the module manifest exists at the target version ──
            MANIFEST_CHECK=$(curl -sf -o /dev/null -w "%{http_code}" \
              "https://mcr.microsoft.com/v2/${REGISTRY_PATH}/manifests/${LATEST_VERSION}" \
              -H "Accept: application/vnd.oci.image.manifest.v1+json" 2>/dev/null || echo "000")
            if [ "$MANIFEST_CHECK" != "200" ]; then
              echo "  SKIP: Manifest not found for ${REGISTRY_PATH}:${LATEST_VERSION} (HTTP ${MANIFEST_CHECK})"
              echo "| \`${MODULE_PATH}\` | \`${CURRENT_VERSION}\` | Skipped — manifest not found (\`${LATEST_VERSION}\`) |" >> "$SKIP_FILE"
              continue
            fi
            echo "  Manifest verified for ${REGISTRY_PATH}:${LATEST_VERSION}"

            echo "  UPDATE: ${CURRENT_VERSION} -> ${LATEST_VERSION}"
            sed -i "s|${MODULE_REF}|br/public:${MODULE_PATH}:${LATEST_VERSION}|g" "$file"

            # Record for change map step (machine-readable)
            echo "${MODULE_PATH}|${CURRENT_VERSION}|${LATEST_VERSION}" >> "$UPDATES_LIST"

            # Group by file — emit heading + table header when file changes
            if [ "$file" != "$CURRENT_FILE" ]; then
              [ -n "$CURRENT_FILE" ] && echo "" >> "$TABLE_FILE"
              echo "#### \`./${file}\`" >> "$TABLE_FILE"
              echo "" >> "$TABLE_FILE"
              echo "| Module | Current Version | Latest Version |" >> "$TABLE_FILE"
              echo "|--------|-----------------|----------------|" >> "$TABLE_FILE"
              CURRENT_FILE="$file"
            fi

            echo "| \`${MODULE_PATH}\` | \`${CURRENT_VERSION}\` | \`${LATEST_VERSION}\` |" >> "$TABLE_FILE"
            UPDATES_FOUND=true
          done < <(grep -rn "br/public:avm/" infra/ --include="*.bicep" | sort -t: -k1,1 -k2,2n)

          # Append skipped modules if any
          if [ -s "$SKIP_FILE" ]; then
            echo "" >> "$TABLE_FILE"
            echo "#### Skipped Modules" >> "$TABLE_FILE"
            echo "" >> "$TABLE_FILE"
            echo "| Module | Current Version | Reason |" >> "$TABLE_FILE"
            echo "|--------|-----------------|--------|" >> "$TABLE_FILE"
            cat "$SKIP_FILE" >> "$TABLE_FILE"
          fi

          if git diff --quiet; then
            echo "updates_found=false" >> "$GITHUB_OUTPUT"
          else
            echo "updates_found=true" >> "$GITHUB_OUTPUT"
          fi

          {
            echo 'update_table<<EOF'
            cat "$TABLE_FILE"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          rm -f "$TABLE_FILE" "$SKIP_FILE"

      - name: Install Bicep CLI
        if: steps.check.outputs.updates_found == 'true'
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep
          sudo mv bicep /usr/local/bin/bicep
          bicep --version

      # ---------------------------------------------------------------
      # Build AVM change map from GitHub source
      #
      # For each updated module, fetch the old and new main.bicep from
      # Azure/bicep-registry-modules, extract top-level param names,
      # and diff them to produce a precise rename/remove/add map.
      # This gives us a known-good source of truth instead of guessing
      # from BCP error messages alone.
      # ---------------------------------------------------------------
      - name: Build AVM change map
        id: changemap
        if: steps.check.outputs.updates_found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CHANGE_MAP="$RUNNER_TEMP/avm_change_map.txt"
          CHANGE_TABLE="$RUNNER_TEMP/avm_change_table.txt"
          > "$CHANGE_MAP"
          > "$CHANGE_TABLE"
          UPDATES_LIST="$RUNNER_TEMP/module_updates.txt"
          AVM_REPO="Azure/bicep-registry-modules"
          SEEN_MODULES=$(mktemp)

          if [ ! -s "$UPDATES_LIST" ]; then
            echo "No module updates to process"
            echo "change_count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Deduplicate modules (same module may appear in multiple files)
          sort -u "$UPDATES_LIST" > /tmp/unique_updates.txt

          while IFS='|' read -r MODULE_PATH OLD_VER NEW_VER; do
            [ -z "$MODULE_PATH" ] && continue

            OLD_TAG="${MODULE_PATH}/${OLD_VER}"
            NEW_TAG="${MODULE_PATH}/${NEW_VER}"

            echo "::group::Change map: ${MODULE_PATH} ${OLD_VER} → ${NEW_VER}"

            # Fetch old main.bicep from GitHub (using git tag as ref)
            OLD_BICEP=$(curl -sf \
              "https://api.github.com/repos/${AVM_REPO}/contents/${MODULE_PATH}/main.bicep?ref=${OLD_TAG}" \
              -H "Accept: application/vnd.github.raw+json" \
              -H "Authorization: Bearer $GH_TOKEN" 2>/dev/null || echo "")

            if [ -z "$OLD_BICEP" ]; then
              echo "  Could not fetch old main.bicep for tag ${OLD_TAG}"
              echo "::endgroup::"
              continue
            fi

            # Fetch new main.bicep
            NEW_BICEP=$(curl -sf \
              "https://api.github.com/repos/${AVM_REPO}/contents/${MODULE_PATH}/main.bicep?ref=${NEW_TAG}" \
              -H "Accept: application/vnd.github.raw+json" \
              -H "Authorization: Bearer $GH_TOKEN" 2>/dev/null || echo "")

            if [ -z "$NEW_BICEP" ]; then
              echo "  Could not fetch new main.bicep for tag ${NEW_TAG}"
              echo "::endgroup::"
              continue
            fi

            # Extract top-level param names (sorted)
            OLD_PARAMS=$(echo "$OLD_BICEP" | grep -P '^param\s+' | awk '{print $2}' | sort)
            NEW_PARAMS=$(echo "$NEW_BICEP" | grep -P '^param\s+' | awk '{print $2}' | sort)

            # Diff: removed params (in old, not in new)
            REMOVED=$(comm -23 <(echo "$OLD_PARAMS") <(echo "$NEW_PARAMS"))
            # Diff: added params (in new, not in old)
            ADDED=$(comm -13 <(echo "$OLD_PARAMS") <(echo "$NEW_PARAMS"))

            # Remaining added params (shrinks as we match renames)
            REMAINING_ADDED="$ADDED"

            if [ -z "$REMOVED" ] && [ -z "$ADDED" ]; then
              echo "  No parameter changes detected"
              echo "::endgroup::"
              continue
            fi

            echo "  Removed params: $(echo $REMOVED | tr '\n' ' ')"
            echo "  Added params:   $(echo $ADDED | tr '\n' ' ')"

            # Match removed → added to find renames
            for OLD_P in $REMOVED; do
              CAP="$(echo "${OLD_P:0:1}" | tr '[:lower:]' '[:upper:]')${OLD_P:1}"
              MATCH=""

              # Pass 1 — camelCase suffix match (e.g., zone → availabilityZone)
              for NEW_P in $REMAINING_ADDED; do
                case "$NEW_P" in *"$CAP") MATCH="$NEW_P"; break ;; esac
              done

              # Pass 2 — case-insensitive substring
              if [ -z "$MATCH" ]; then
                for NEW_P in $REMAINING_ADDED; do
                  if echo "$NEW_P" | grep -qi "$OLD_P"; then
                    MATCH="$NEW_P"
                    break
                  fi
                done
              fi

              if [ -n "$MATCH" ]; then
                echo "  RENAME: ${OLD_P} → ${MATCH}"
                echo "RENAME|${MODULE_PATH}|${OLD_P}|${MATCH}" >> "$CHANGE_MAP"
                echo "| \`${MODULE_PATH}\` | Renamed | \`${OLD_P}\` | \`${MATCH}\` |" >> "$CHANGE_TABLE"
                REMAINING_ADDED=$(echo "$REMAINING_ADDED" | grep -v "^${MATCH}$" || true)
              else
                echo "  REMOVE: ${OLD_P} (no matching new param)"
                echo "REMOVE|${MODULE_PATH}|${OLD_P}|" >> "$CHANGE_MAP"
                echo "| \`${MODULE_PATH}\` | Removed | \`${OLD_P}\` | — |" >> "$CHANGE_TABLE"
              fi
            done

            # Log newly added params (these may require manual additions)
            for NEW_P in $REMAINING_ADDED; do
              echo "  ADD: ${NEW_P} (new required param)"
              echo "ADD|${MODULE_PATH}||${NEW_P}" >> "$CHANGE_MAP"
              echo "| \`${MODULE_PATH}\` | Added | — | \`${NEW_P}\` |" >> "$CHANGE_TABLE"
            done

            echo "::endgroup::"
          done < /tmp/unique_updates.txt

          CHANGE_COUNT=$(wc -l < "$CHANGE_MAP" 2>/dev/null | tr -d ' ')
          echo "change_count=${CHANGE_COUNT:-0}" >> "$GITHUB_OUTPUT"

          # Output the change table for PR body
          {
            echo 'change_table<<EOF'
            cat "$CHANGE_TABLE"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          rm -f /tmp/unique_updates.txt

      # ---------------------------------------------------------------
      # Auto-fix loop: two-phase approach
      #
      # Phase 1 — Source-based fixes (high confidence):
      #   Use the AVM change map (built from GitHub source) to apply
      #   known parameter renames and removals directly.
      #
      # Phase 2 — BCP error-based fixes (fallback):
      #   Parse Bicep build errors (BCP037/BCP035) and attempt to
      #   match removed→missing properties for anything the change
      #   map didn't cover. Repeat up to MAX_ATTEMPTS times.
      # ---------------------------------------------------------------
      - name: Auto-fix breaking changes
        id: autofix
        if: steps.check.outputs.updates_found == 'true'
        shell: bash
        run: |
          BICEP_FILES=$(find infra/ -name '*.bicep' -not -name '*.bicepparam' | sort)
          MAX_ATTEMPTS=3
          FIX_LOG="$RUNNER_TEMP/auto_fix_log.txt"
          CHANGE_MAP="$RUNNER_TEMP/avm_change_map.txt"
          > "$FIX_LOG"

          for BICEP_FILE in $BICEP_FILES; do
            echo "=== Processing ./$BICEP_FILE ==="

            # Build module lookup: line_number:module_name:avm_path
            MODULE_INDEX=$(mktemp)
            while IFS= read -r modline; do
              MOD_LINENUM=$(echo "$modline" | cut -d: -f1)
              MOD_NAME=$(echo "$modline" | sed "s/^[0-9]*:module \([^ ]*\).*/\1/")
              AVM_PATH=$(sed -n "${MOD_LINENUM}p" "$BICEP_FILE" | grep -oP "avm/[^:'\"]+" || echo "unknown")
              echo "${MOD_LINENUM}:${MOD_NAME}:${AVM_PATH}" >> "$MODULE_INDEX"
            done < <(grep -n '^module ' "$BICEP_FILE" || true)

            # Function: resolve error line to module_name and avm_path (tab-separated)
            resolve_module() {
              local ERR_LINE=$1
              local BEST_NAME="" BEST_PATH="" BEST_START=0
              while IFS=: read -r ML MN MP; do
                if [ "$ERR_LINE" -ge "$ML" ] && [ "$ML" -ge "$BEST_START" ]; then
                  BEST_NAME="$MN"; BEST_PATH="$MP"; BEST_START=$ML
                fi
              done < "$MODULE_INDEX"
              echo "${BEST_NAME:-unknown}	${BEST_PATH:-unknown}"
            }

            # ── Phase 1: Apply source-based fixes from AVM change map ──
            if [ -s "$CHANGE_MAP" ]; then
              echo "  Phase 1: Applying known changes from AVM source..."
              PHASE1_FIXED=0

              while IFS=: read -r MOD_LINE MOD_NAME MOD_AVM_PATH; do
                # Find the params block range for this module
                TOTAL_LINES=$(wc -l < "$BICEP_FILE")
                # Scan for 'params:' after the module declaration line
                PARAMS_START=""
                for (( i=MOD_LINE; i<=TOTAL_LINES; i++ )); do
                  if sed -n "${i}p" "$BICEP_FILE" | grep -qP '^\s+params:\s*\{'; then
                    PARAMS_START=$i
                    break
                  fi
                  # Also match 'params: {' on separate line
                  if sed -n "${i}p" "$BICEP_FILE" | grep -qP '^\s+params:\s*$'; then
                    PARAMS_START=$((i + 1))
                    break
                  fi
                  # Stop if we hit the next module or end of block
                  if [ "$i" -gt "$((MOD_LINE + 2))" ] && sed -n "${i}p" "$BICEP_FILE" | grep -qP '^(module |resource |var |output )'; then
                    break
                  fi
                done

                [ -z "$PARAMS_START" ] && continue

                # Apply renames from change map for this module's AVM path
                while IFS='|' read -r ACTION MAP_PATH OLD_PARAM NEW_PARAM; do
                  [ "$MAP_PATH" != "$MOD_AVM_PATH" ] && continue

                  if [ "$ACTION" = "RENAME" ]; then
                    # Find the line within this module's params block that uses OLD_PARAM
                    MATCH_LINE=$(awk -v start="$PARAMS_START" -v prop="$OLD_PARAM" '
                      NR >= start {
                        depth += gsub(/{/, "{"); depth -= gsub(/}/, "}")
                        if (depth <= 0 && NR > start) exit
                        if ($0 ~ "^[[:space:]]+" prop ":") { print NR; exit }
                      }
                    ' "$BICEP_FILE")

                    if [ -n "$MATCH_LINE" ]; then
                      echo "    RENAME (source): '${OLD_PARAM}' → '${NEW_PARAM}' (line $MATCH_LINE) in $MOD_NAME"
                      sed -i "${MATCH_LINE}s/^\([[:space:]]*\)${OLD_PARAM}:/\1${NEW_PARAM}:/" "$BICEP_FILE"
                      MOD_RES="$MOD_AVM_PATH"
                      echo "RENAME|${OLD_PARAM}|${NEW_PARAM}|${MATCH_LINE}|${MOD_NAME}|${MOD_RES}|./${BICEP_FILE}" >> "$FIX_LOG"
                      PHASE1_FIXED=$((PHASE1_FIXED + 1))
                    fi

                  elif [ "$ACTION" = "REMOVE" ]; then
                    MATCH_LINE=$(awk -v start="$PARAMS_START" -v prop="$OLD_PARAM" '
                      NR >= start {
                        depth += gsub(/{/, "{"); depth -= gsub(/}/, "}")
                        if (depth <= 0 && NR > start) exit
                        if ($0 ~ "^[[:space:]]+" prop ":") { print NR; exit }
                      }
                    ' "$BICEP_FILE")

                    if [ -n "$MATCH_LINE" ]; then
                      echo "    COMMENT OUT (source): '${OLD_PARAM}' (line $MATCH_LINE) in $MOD_NAME"
                      sed -i "${MATCH_LINE}s|^\([[:space:]]*\)\(.*\)|\1// [auto-removed] \2|" "$BICEP_FILE"
                      MOD_RES="$MOD_AVM_PATH"
                      echo "REMOVE|${OLD_PARAM}||${MATCH_LINE}|${MOD_NAME}|${MOD_RES}|./${BICEP_FILE}" >> "$FIX_LOG"
                      PHASE1_FIXED=$((PHASE1_FIXED + 1))
                    fi
                  fi
                done < "$CHANGE_MAP"

              done < "$MODULE_INDEX"

              echo "  Phase 1 applied $PHASE1_FIXED fix(es) from AVM source"
            fi

            # ── Phase 2: BCP error-based fallback ──
            for attempt in $(seq 1 $MAX_ATTEMPTS); do
              echo "::group::Auto-fix ./$BICEP_FILE Phase 2 attempt $attempt/$MAX_ATTEMPTS"

              # Build and capture errors
              ERRORS=$(bicep build "$BICEP_FILE" --stdout 2>&1 >/dev/null) || true

              ERROR_COUNT=$(echo "$ERRORS" | grep -c ' : Error ' || true)
              if [ "$ERROR_COUNT" -eq 0 ]; then
                echo "No build errors — build is clean"
                echo "::endgroup::"
                break
              fi
              echo "Found $ERROR_COUNT error(s)"

              # --- Parse BCP037: removed / not-allowed properties ---
              echo "$ERRORS" | grep 'BCP037' > /tmp/bcp037.txt 2>/dev/null || true
              > /tmp/removed.txt
              while IFS= read -r errline; do
                [ -z "$errline" ] && continue
                LINENUM=$(echo "$errline" | grep -oP '\(\d+,' | head -1 | grep -oP '\d+')
                PROP=$(echo "$errline" | grep -oP 'The property "\K[^"]+')
                [ -n "$LINENUM" ] && [ -n "$PROP" ] && echo "${LINENUM}:${PROP}" >> /tmp/removed.txt
              done < /tmp/bcp037.txt

              # --- Parse BCP035: missing required properties ---
              echo "$ERRORS" | grep 'BCP035' > /tmp/bcp035.txt 2>/dev/null || true
              > /tmp/missing.txt
              while IFS= read -r errline; do
                [ -z "$errline" ] && continue
                echo "$errline" | sed 's/.*required properties: //' | grep -oP '"[^"]+"' | tr -d '"'
              done < /tmp/bcp035.txt | sort -u > /tmp/missing.txt

              echo "  Removed properties (BCP037):" && cat /tmp/removed.txt 2>/dev/null || true
              echo "  Missing properties (BCP035):" && cat /tmp/missing.txt 2>/dev/null || true

              FIXED=0

              # --- Match removed properties to missing ones ---
              while IFS=: read -r LINENUM OLD_PROP; do
                [ -z "$OLD_PROP" ] && continue
                CAPITALISED="$(echo "${OLD_PROP:0:1}" | tr '[:lower:]' '[:upper:]')${OLD_PROP:1}"
                MATCH=""

                # Pass 1 — camelCase suffix (most precise, e.g. zone → availabilityZone)
                while IFS= read -r MISS; do
                  [ -z "$MISS" ] && continue
                  case "$MISS" in *"$CAPITALISED") MATCH="$MISS"; break ;; esac
                done < /tmp/missing.txt

                # Pass 2 — case-insensitive substring
                if [ -z "$MATCH" ]; then
                  while IFS= read -r MISS; do
                    [ -z "$MISS" ] && continue
                    if echo "$MISS" | grep -qi "$OLD_PROP"; then
                      MATCH="$MISS"
                      break
                    fi
                  done < /tmp/missing.txt
                fi

                if [ -n "$MATCH" ]; then
                  MOD_INFO=$(resolve_module "$LINENUM")
                  MOD_NAME=$(echo "$MOD_INFO" | cut -f1)
                  MOD_RES=$(echo "$MOD_INFO" | cut -f2)
                  echo "    RENAME: '$OLD_PROP' → '$MATCH' (line $LINENUM) in $MOD_NAME ($MOD_RES)"
                  sed -i "${LINENUM}s/^\([[:space:]]*\)${OLD_PROP}:/\1${MATCH}:/" "$BICEP_FILE"
                  echo "RENAME|${OLD_PROP}|${MATCH}|${LINENUM}|${MOD_NAME}|${MOD_RES}|./${BICEP_FILE}" >> "$FIX_LOG"
                  # Remove matched property from the missing list
                  grep -v "^${MATCH}$" /tmp/missing.txt > /tmp/missing_new.txt 2>/dev/null || true
                  mv /tmp/missing_new.txt /tmp/missing.txt
                  FIXED=$((FIXED + 1))
                else
                  MOD_INFO=$(resolve_module "$LINENUM")
                  MOD_NAME=$(echo "$MOD_INFO" | cut -f1)
                  MOD_RES=$(echo "$MOD_INFO" | cut -f2)
                  echo "    COMMENT OUT: '$OLD_PROP' (line $LINENUM) in $MOD_NAME ($MOD_RES) — no replacement found"
                  sed -i "${LINENUM}s|^\([[:space:]]*\)\(.*\)|\1// [auto-removed] \2|" "$BICEP_FILE"
                  echo "REMOVE|${OLD_PROP}||${LINENUM}|${MOD_NAME}|${MOD_RES}|./${BICEP_FILE}" >> "$FIX_LOG"
                  FIXED=$((FIXED + 1))
                fi
              done < /tmp/removed.txt

              # Log any remaining unresolved missing properties
              while IFS= read -r MISS; do
                [ -z "$MISS" ] && continue
                if ! grep -q "UNRESOLVED|${MISS}|" "$FIX_LOG" 2>/dev/null; then
                  echo "    UNRESOLVED: missing required property '$MISS'"
                  echo "UNRESOLVED|${MISS}|||||./${BICEP_FILE}" >> "$FIX_LOG"
                fi
              done < /tmp/missing.txt

              echo "::endgroup::"

              if [ "$FIXED" -eq 0 ]; then
                echo "No more auto-fixes available for ./$BICEP_FILE"
                break
              fi
              echo "Applied $FIXED fix(es) — re-validating..."
            done

            rm -f "$MODULE_INDEX"
          done

          # Determine auto-fix outcome across all files
          FINAL_FAIL=0
          for BICEP_FILE in $BICEP_FILES; do
            ERRS=$(bicep build "$BICEP_FILE" --stdout 2>&1 >/dev/null) || true
            CNT=$(echo "$ERRS" | grep -c ' : Error ' || true)
            FINAL_FAIL=$((FINAL_FAIL + CNT))
          done

          if [ "$FINAL_FAIL" -eq 0 ]; then
            echo "auto_fix_result=success" >> "$GITHUB_OUTPUT"
          else
            echo "auto_fix_result=partial" >> "$GITHUB_OUTPUT"
          fi

          FIX_COUNT=$(grep -c '^RENAME\|^REMOVE' "$FIX_LOG" 2>/dev/null || true)
          echo "fix_count=${FIX_COUNT:-0}" >> "$GITHUB_OUTPUT"

          {
            echo 'fix_log<<EOF'
            cat "$FIX_LOG"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          rm -f /tmp/bcp037.txt /tmp/bcp035.txt /tmp/removed.txt /tmp/missing.txt

      # --- Final validation after auto-fix ---
      - name: Bicep Build (final)
        id: bicep-build
        if: steps.check.outputs.updates_found == 'true'
        continue-on-error: true
        run: |
          > "$RUNNER_TEMP/build_errors.txt"
          for f in $(find infra/ -name '*.bicep' -not -name '*.bicepparam' | sort); do
            bicep build "$f" --stdout > /dev/null 2>> "$RUNNER_TEMP/build_errors.txt" || true
          done
          [ ! -s "$RUNNER_TEMP/build_errors.txt" ]

      - name: Bicep Lint (final)
        id: bicep-lint
        if: steps.check.outputs.updates_found == 'true'
        continue-on-error: true
        run: |
          > "$RUNNER_TEMP/lint_errors.txt"
          for f in $(find infra/ -name '*.bicep' -not -name '*.bicepparam' | sort); do
            bicep lint "$f" 2>> "$RUNNER_TEMP/lint_errors.txt" || true
          done
          [ ! -s "$RUNNER_TEMP/lint_errors.txt" ]

      - name: Capture validation results
        id: validation
        if: steps.check.outputs.updates_found == 'true'
        run: |
          BUILD_STATUS="${{ steps.bicep-build.outcome }}"
          LINT_STATUS="${{ steps.bicep-lint.outcome }}"

          BUILD_ERRORS=""
          if [ -f "$RUNNER_TEMP/build_errors.txt" ] && [ -s "$RUNNER_TEMP/build_errors.txt" ]; then
            BUILD_ERRORS=$(cat "$RUNNER_TEMP/build_errors.txt")
          fi

          LINT_ERRORS=""
          if [ -f "$RUNNER_TEMP/lint_errors.txt" ] && [ -s "$RUNNER_TEMP/lint_errors.txt" ]; then
            LINT_ERRORS=$(cat "$RUNNER_TEMP/lint_errors.txt")
          fi

          if [ "$BUILD_STATUS" = "success" ] && [ "$LINT_STATUS" = "success" ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi

          {
            echo 'build_errors<<EOF'
            echo "$BUILD_ERRORS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          {
            echo 'lint_errors<<EOF'
            echo "$LINT_ERRORS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          echo "build_status=$BUILD_STATUS" >> "$GITHUB_OUTPUT"
          echo "lint_status=$LINT_STATUS" >> "$GITHUB_OUTPUT"

          # Map error line numbers to module names (across all files)
          AFFECTED_MODULES=""
          if [ -f "$RUNNER_TEMP/build_errors.txt" ] || [ -f "$RUNNER_TEMP/lint_errors.txt" ]; then
            for BICEP_FILE in $(find infra/ -name '*.bicep' -not -name '*.bicepparam'); do
              FILE_ERRORS=$(grep "$BICEP_FILE" "$RUNNER_TEMP/build_errors.txt" "$RUNNER_TEMP/lint_errors.txt" 2>/dev/null || true)
              ERROR_LINES=$(echo "$FILE_ERRORS" | grep -ohP '\(\d+,' | grep -oP '\d+' | sort -un)
              MODULE_STARTS=$(grep -n '^module ' "$BICEP_FILE" 2>/dev/null | sed 's/:module \([^ ]*\).*/:\1/')

              for ERR_LINE in $ERROR_LINES; do
                [ -z "$ERR_LINE" ] && continue
                MATCHED_MODULE=""
                MATCHED_START=0
                while IFS=: read -r MOD_LINE MOD_NAME; do
                  if [ "$ERR_LINE" -ge "$MOD_LINE" ] && [ "$MOD_LINE" -ge "$MATCHED_START" ]; then
                    MATCHED_MODULE="$MOD_NAME"
                    MATCHED_START=$MOD_LINE
                  fi
                done <<< "$MODULE_STARTS"
                if [ -n "$MATCHED_MODULE" ]; then
                  AFFECTED_MODULES="$AFFECTED_MODULES $MATCHED_MODULE"
                fi
              done
            done
            AFFECTED_MODULES=$(echo "$AFFECTED_MODULES" | tr ' ' '\n' | sort -u | grep -v '^$' | tr '\n' ',' | sed 's/,$//')
          fi
          echo "affected_modules=$AFFECTED_MODULES" >> "$GITHUB_OUTPUT"



      - name: Build PR body
        id: pr-body
        if: steps.check.outputs.updates_found == 'true'
        run: |
          AUTO_RESULT="${{ steps.autofix.outputs.auto_fix_result }}"
          FIX_COUNT="${{ steps.autofix.outputs.fix_count }}"
          VALIDATION="${{ steps.validation.outputs.result }}"
          CHANGE_COUNT="${{ steps.changemap.outputs.change_count }}"

          {
            echo 'body<<EOF'
            echo 'Automated PR to update Azure Verified Module (AVM) references to the latest versions.'
            echo ''
            echo '### Module Updates'
            echo ''
            echo '${{ steps.check.outputs.update_table }}'
            echo ''

            # Parameter changes detected from AVM source
            if [ "$CHANGE_COUNT" != "0" ] && [ "$CHANGE_COUNT" != "" ]; then
              echo '### Parameter Changes Detected (from [AVM source](https://github.com/Azure/bicep-registry-modules/tree/main/avm))'
              echo ''
              echo 'Cross-referenced old and new module versions to identify parameter interface changes:'
              echo ''
              echo '| Module | Change | Old Parameter | New Parameter |'
              echo '|--------|--------|---------------|---------------|'
              echo '${{ steps.changemap.outputs.change_table }}'
              echo ''
            fi

            # Auto-fix summary grouped by file
            if [ "$FIX_COUNT" != "0" ]; then
              echo '### Auto-Fix Summary'
              echo ''
              echo 'The following breaking changes were automatically resolved:'
              echo ''
              # Get unique file paths from fix log (7th field)
              FIX_FILES=$(echo '${{ steps.autofix.outputs.fix_log }}' | grep '^RENAME\|^REMOVE' | awk -F'|' '{print $7}' | sort -u)
              for FIX_FILE in $FIX_FILES; do
                echo "#### ${FIX_FILE}"
                echo ''
                echo '| Action | Module Name | Module Resource | Old Property | New Property | Line |'
                echo '|--------|-------------|-----------------|-------------|--------------|------|'
                echo '${{ steps.autofix.outputs.fix_log }}' | while IFS='|' read -r ACTION OLD NEW LINE MOD_NAME MOD_RES FILE_PATH; do
                  [ "$FILE_PATH" != "$FIX_FILE" ] && continue
                  case "$ACTION" in
                    RENAME)  echo "| Renamed | \`${MOD_NAME}\` | \`${MOD_RES}\` | \`${OLD}\` | \`${NEW}\` | ${LINE} |" ;;
                    REMOVE)  echo "| Commented out | \`${MOD_NAME}\` | \`${MOD_RES}\` | \`${OLD}\` | — | ${LINE} |" ;;
                  esac
                done
                echo ''
              done
            fi

            # Unresolved items grouped by file
            UNRESOLVED=$(echo '${{ steps.autofix.outputs.fix_log }}' | grep '^UNRESOLVED' || true)
            if [ -n "$UNRESOLVED" ]; then
              echo '### Unresolved Changes'
              echo ''
              echo 'The following new required properties could not be auto-resolved:'
              echo ''
              UNRESOLVED_FILES=$(echo "$UNRESOLVED" | awk -F'|' '{print $7}' | sort -u)
              for UF in $UNRESOLVED_FILES; do
                echo "#### ${UF}"
                echo ''
                echo "$UNRESOLVED" | while IFS='|' read -r _ PROP _ _ _ _ FILE_PATH; do
                  [ "$FILE_PATH" != "$UF" ] && continue
                  echo "- \`${PROP}\`"
                done
                echo ''
              done
            fi

            if [ "$VALIDATION" = "success" ]; then
              echo '> **All checks passed.** This PR is ready for review.'
            else
              echo '> **⚠️ Manual intervention required.** Some breaking changes could not be auto-resolved. Please review the validation comment for details.'
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          # Dynamic PR title
          if [ "$VALIDATION" = "success" ]; then
            echo "title=chore: Auto-update AVM Bicep module versions" >> "$GITHUB_OUTPUT"
          else
            echo "title=chore: Auto-update AVM Bicep module versions (needs manual fixes)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        id: create-pr
        if: steps.check.outputs.updates_found == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: auto-update AVM Bicep module versions"
          branch: "chore/avm-module-auto-updates"
          title: ${{ steps.pr-body.outputs.title }}
          body: ${{ steps.pr-body.outputs.body }}
          labels: |
            dependencies
            bicep
          delete-branch: true

      - name: Set Bicep Validate status on PR
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RESULT="${{ steps.validation.outputs.result }}"
          if [ "$RESULT" = "success" ]; then
            STATE="success"
            DESC="Bicep build and lint passed (auto-fixed)"
          else
            STATE="failure"
            DESC="Bicep validation failed — manual intervention required"
          fi
          gh api repos/${{ github.repository }}/statuses/${{ steps.create-pr.outputs.pull-request-head-sha }} \
            -f state="$STATE" \
            -f context="Bicep Build & Lint" \
            -f description="$DESC" \
            -f target_url="$GITHUB_SERVER_URL/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Post validation comment on PR
        if: steps.create-pr.outputs.pull-request-number
        uses: actions/github-script@v8
        env:
          RUNNER_TEMP: ${{ runner.temp }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const runnerTemp = process.env.RUNNER_TEMP;
            const prNumber = ${{ steps.create-pr.outputs.pull-request-number }};
            const result = '${{ steps.validation.outputs.result }}';
            const buildStatus = '${{ steps.validation.outputs.build_status }}';
            const lintStatus = '${{ steps.validation.outputs.lint_status }}';
            const affectedModules = '${{ steps.validation.outputs.affected_modules }}';
            const autoResult = '${{ steps.autofix.outputs.auto_fix_result }}';
            const fixCount = '${{ steps.autofix.outputs.fix_count }}';
            const changeCount = '${{ steps.changemap.outputs.change_count }}';

            const stripPath = (s) => s.replace(/\/home\/runner\/work\/[^/]+\/[^/]+\//g, '');

            let buildErrors = '';
            try { buildErrors = stripPath(fs.readFileSync(path.join(runnerTemp, 'build_errors.txt'), 'utf8').trim()); } catch {}
            let lintErrors = '';
            try { lintErrors = stripPath(fs.readFileSync(path.join(runnerTemp, 'lint_errors.txt'), 'utf8').trim()); } catch {}

            // Parse auto-fix log
            let fixLog = '';
            try { fixLog = fs.readFileSync(path.join(runnerTemp, 'auto_fix_log.txt'), 'utf8').trim(); } catch {}

            const renames = [];
            const removals = [];
            const unresolved = [];
            if (fixLog) {
              for (const line of fixLog.split('\n')) {
                const parts = line.split('|');
                if (parts[0] === 'RENAME')     renames.push({ old: parts[1], new: parts[2], line: parts[3], modName: parts[4] || '', modRes: parts[5] || '', file: parts[6] || '' });
                if (parts[0] === 'REMOVE')     removals.push({ old: parts[1], line: parts[3], modName: parts[4] || '', modRes: parts[5] || '', file: parts[6] || '' });
                if (parts[0] === 'UNRESOLVED') unresolved.push({ prop: parts[1], file: parts[6] || '' });
              }
            }

            const buildIcon = buildStatus === 'success' ? 'Passed' : 'Failed';
            const lintIcon = lintStatus === 'success' ? 'Passed' : 'Failed';
            const heading = result === 'success'
              ? '## Bicep Validation Passed — Auto-Fix Successful'
              : '## Bicep Validation Failed — Manual Intervention Required';

            const lines = [
              '<!-- bicep-validate-comment -->',
              heading,
              '',
              '| Check | Status |',
              '|-------|--------|',
              `| Bicep Build | ${buildIcon} |`,
              `| Bicep Lint | ${lintIcon} |`,
            ];

            // Parameter changes detected from AVM source
            let changeMap = '';
            try { changeMap = fs.readFileSync(path.join(runnerTemp, 'avm_change_map.txt'), 'utf8').trim(); } catch {}

            if (changeMap) {
              const changes = changeMap.split('\n').map(l => l.split('|'));
              lines.push('', '### Parameter Changes Detected (from [AVM source](https://github.com/Azure/bicep-registry-modules/tree/main/avm))', '');
              lines.push('| Module | Change | Old Parameter | New Parameter |');
              lines.push('|--------|--------|---------------|---------------|');
              for (const [action, mod, oldP, newP] of changes) {
                const label = action === 'RENAME' ? 'Renamed' : action === 'REMOVE' ? 'Removed' : 'Added';
                lines.push(`| \`${mod}\` | ${label} | \`${oldP || '—'}\` | \`${newP || '—'}\` |`);
              }
              lines.push('');
            }

            // Auto-fix changes grouped by file
            if (renames.length > 0 || removals.length > 0) {
              lines.push('', '### Auto-Fix Changes', '');
              const allFixes = [
                ...renames.map(r => ({ ...r, action: 'Renamed', newProp: r.new })),
                ...removals.map(r => ({ ...r, action: 'Commented out', newProp: '—' }))
              ];
              const files = [...new Set(allFixes.map(f => f.file))].sort();
              for (const file of files) {
                lines.push(`#### ${file}`, '');
                lines.push('| Action | Module Name | Module Resource | Old Property | New Property | Line |');
                lines.push('|--------|-------------|-----------------|-------------|--------------|------|');
                for (const f of allFixes.filter(f => f.file === file)) {
                  lines.push(`| ${f.action} | \`${f.modName}\` | \`${f.modRes}\` | \`${f.old}\` | \`${f.newProp}\` | ${f.line} |`);
                }
                lines.push('');
              }
            }

            // Unresolved grouped by file
            if (unresolved.length > 0) {
              lines.push('', '### Unresolved — Needs Manual Fix', '');
              const uFiles = [...new Set(unresolved.map(u => u.file))].sort();
              for (const file of uFiles) {
                lines.push(`#### ${file}`, '');
                for (const u of unresolved.filter(u => u.file === file)) {
                  lines.push(`- Missing required property: \`${u.prop}\``);
                }
                lines.push('');
              }
            }

            // Affected modules
            if (affectedModules && result !== 'success') {
              const modules = affectedModules.split(',');
              lines.push('', '### Affected Modules', '');
              modules.forEach(m => lines.push(`- \`${m}\``));
            }

            if (buildErrors) {
              lines.push('', '### Build Errors', '', '```', buildErrors, '```');
            }
            if (lintErrors) {
              lines.push('', '### Lint Warnings / Errors', '', '```', lintErrors, '```');
            }
            if (result !== 'success') {
              lines.push('', '> **Note:** The updated module versions introduced breaking changes that could not be fully auto-resolved. Please fix the remaining issues manually before merging.');
            }

            lines.push('', `Validated at \`${new Date().toISOString()}\` by [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`);

            const body = lines.join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            const marker = '<!-- bicep-validate-comment -->';
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });
            }
