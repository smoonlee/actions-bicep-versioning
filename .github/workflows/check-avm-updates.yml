name: "Check AVM Module Updates"

on:
  schedule:
    - cron: "0 8 * * 1" # Every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  check-updates:
    name: "Check for AVM Updates"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for AVM module updates
        id: check
        run: |
          set -e
          TABLE_FILE=$(mktemp)
          SKIP_FILE=$(mktemp)
          UPDATES_FOUND=false
          CURRENT_FILE=""

          # ── Helper: compare two semver strings ──
          # Returns 0 if $1 > $2, 1 otherwise
          semver_gt() {
            local IFS=.
            local i a=($1) b=($2)
            for ((i=0; i<3; i++)); do
              [ "${a[i]:-0}" -gt "${b[i]:-0}" ] && return 0
              [ "${a[i]:-0}" -lt "${b[i]:-0}" ] && return 1
            done
            return 1  # equal
          }

          # Find all Bicep files with AVM module references
          while IFS= read -r match; do
            file=$(echo "$match" | cut -d: -f1)
            content=$(echo "$match" | cut -d: -f3-)

            # Extract module path and current version
            MODULE_REF=$(echo "$content" | grep -oP "br/public:avm/[^'\"]+")
            if [ -z "$MODULE_REF" ]; then
              continue
            fi

            # Split into module path and version
            MODULE_PATH=$(echo "$MODULE_REF" | rev | cut -d: -f2- | rev | sed 's|br/public:||')
            CURRENT_VERSION=$(echo "$MODULE_REF" | rev | cut -d: -f1 | rev)

            # Query MCR for available tags
            REGISTRY_PATH="bicep/${MODULE_PATH}"
            echo "Checking ${REGISTRY_PATH} (current: ${CURRENT_VERSION})"

            # ── Cross-check 1: Validate current version is valid semver ──
            if ! echo "$CURRENT_VERSION" | grep -qP '^\d+\.\d+\.\d+$'; then
              echo "  SKIP: Current version '${CURRENT_VERSION}' is not valid semver"
              echo "| \`${MODULE_PATH}\` | \`${CURRENT_VERSION}\` | Skipped — invalid current version |" >> "$SKIP_FILE"
              continue
            fi

            # ── Fetch available tags from MCR ──
            TAGS_JSON=$(curl -sf "https://mcr.microsoft.com/v2/${REGISTRY_PATH}/tags/list" 2>/dev/null || echo "")
            if [ -z "$TAGS_JSON" ]; then
              echo "  SKIP: Could not fetch tags for ${REGISTRY_PATH}"
              echo "| \`${MODULE_PATH}\` | \`${CURRENT_VERSION}\` | Skipped — registry unreachable |" >> "$SKIP_FILE"
              continue
            fi

            # ── Cross-check 2: Filter to stable semver tags only (no pre-release) ──
            STABLE_TAGS=$(echo "$TAGS_JSON" | jq -r '.tags[]' | grep -P '^\d+\.\d+\.\d+$' || true)
            if [ -z "$STABLE_TAGS" ]; then
              echo "  SKIP: No stable release tags found for ${REGISTRY_PATH}"
              echo "| \`${MODULE_PATH}\` | \`${CURRENT_VERSION}\` | Skipped — no stable tags |" >> "$SKIP_FILE"
              continue
            fi

            LATEST_VERSION=$(echo "$STABLE_TAGS" | sort -V | tail -n 1)
            echo "  Latest stable: ${LATEST_VERSION}"

            # ── Cross-check 3: Ensure it's actually newer (not a downgrade) ──
            if [ "$CURRENT_VERSION" = "$LATEST_VERSION" ]; then
              echo "  Already on latest"
              continue
            fi
            if ! semver_gt "$LATEST_VERSION" "$CURRENT_VERSION"; then
              echo "  SKIP: Latest '${LATEST_VERSION}' is not newer than current '${CURRENT_VERSION}'"
              continue
            fi

            # ── Cross-check 4: Verify the module manifest exists at the target version ──
            MANIFEST_CHECK=$(curl -sf -o /dev/null -w "%{http_code}" \
              "https://mcr.microsoft.com/v2/${REGISTRY_PATH}/manifests/${LATEST_VERSION}" \
              -H "Accept: application/vnd.oci.image.manifest.v1+json" 2>/dev/null || echo "000")
            if [ "$MANIFEST_CHECK" != "200" ]; then
              echo "  SKIP: Manifest not found for ${REGISTRY_PATH}:${LATEST_VERSION} (HTTP ${MANIFEST_CHECK})"
              echo "| \`${MODULE_PATH}\` | \`${CURRENT_VERSION}\` | Skipped — manifest not found (\`${LATEST_VERSION}\`) |" >> "$SKIP_FILE"
              continue
            fi
            echo "  Manifest verified for ${REGISTRY_PATH}:${LATEST_VERSION}"

            echo "  UPDATE: ${CURRENT_VERSION} -> ${LATEST_VERSION}"
            sed -i "s|${MODULE_REF}|br/public:${MODULE_PATH}:${LATEST_VERSION}|g" "$file"

            # Group by file — emit heading + table header when file changes
            if [ "$file" != "$CURRENT_FILE" ]; then
              [ -n "$CURRENT_FILE" ] && echo "" >> "$TABLE_FILE"
              echo "#### \`./${file}\`" >> "$TABLE_FILE"
              echo "" >> "$TABLE_FILE"
              echo "| Module | Current Version | Latest Version |" >> "$TABLE_FILE"
              echo "|--------|-----------------|----------------|" >> "$TABLE_FILE"
              CURRENT_FILE="$file"
            fi

            echo "| \`${MODULE_PATH}\` | \`${CURRENT_VERSION}\` | \`${LATEST_VERSION}\` |" >> "$TABLE_FILE"
            UPDATES_FOUND=true
          done < <(grep -rn "br/public:avm/" infra/ --include="*.bicep" | sort -t: -k1,1 -k2,2n)

          # Append skipped modules if any
          if [ -s "$SKIP_FILE" ]; then
            echo "" >> "$TABLE_FILE"
            echo "#### Skipped Modules" >> "$TABLE_FILE"
            echo "" >> "$TABLE_FILE"
            echo "| Module | Current Version | Reason |" >> "$TABLE_FILE"
            echo "|--------|-----------------|--------|" >> "$TABLE_FILE"
            cat "$SKIP_FILE" >> "$TABLE_FILE"
          fi

          # Detect changes via git
          if git diff --quiet; then
            echo "updates_found=false" >> "$GITHUB_OUTPUT"
          else
            echo "updates_found=true" >> "$GITHUB_OUTPUT"
          fi

          # Build PR body with the update table
          {
            echo 'pr_body<<EOF'
            echo 'Automated PR to update Azure Verified Module (AVM) references to the latest versions.'
            echo ''
            echo '### Module Updates'
            echo ''
            cat "$TABLE_FILE"
            echo ''
            echo '> **⚠️ Manual review required.** This PR updates module versions only — no auto-fix is applied. Breaking changes (renamed or removed parameters) may need to be resolved manually before merging.'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          rm -f "$TABLE_FILE"

      - name: Install Bicep CLI
        if: steps.check.outputs.updates_found == 'true'
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep
          sudo mv bicep /usr/local/bin/bicep
          bicep --version

      - name: Bicep Build
        id: bicep-build
        if: steps.check.outputs.updates_found == 'true'
        continue-on-error: true
        run: |
          > "$RUNNER_TEMP/build_errors.txt"
          for f in $(find infra/ -name '*.bicep' -not -name '*.bicepparam' | sort); do
            bicep build "$f" --stdout > /dev/null 2>> "$RUNNER_TEMP/build_errors.txt" || true
          done
          [ ! -s "$RUNNER_TEMP/build_errors.txt" ]

      - name: Bicep Lint
        id: bicep-lint
        if: steps.check.outputs.updates_found == 'true'
        continue-on-error: true
        run: |
          > "$RUNNER_TEMP/lint_errors.txt"
          for f in $(find infra/ -name '*.bicep' -not -name '*.bicepparam' | sort); do
            bicep lint "$f" 2>> "$RUNNER_TEMP/lint_errors.txt" || true
          done
          [ ! -s "$RUNNER_TEMP/lint_errors.txt" ]

      - name: Capture validation results
        id: validation
        if: steps.check.outputs.updates_found == 'true'
        run: |
          BUILD_STATUS="${{ steps.bicep-build.outcome }}"
          LINT_STATUS="${{ steps.bicep-lint.outcome }}"

          BUILD_ERRORS=""
          if [ -f "$RUNNER_TEMP/build_errors.txt" ] && [ -s "$RUNNER_TEMP/build_errors.txt" ]; then
            BUILD_ERRORS=$(cat "$RUNNER_TEMP/build_errors.txt")
          fi

          LINT_ERRORS=""
          if [ -f "$RUNNER_TEMP/lint_errors.txt" ] && [ -s "$RUNNER_TEMP/lint_errors.txt" ]; then
            LINT_ERRORS=$(cat "$RUNNER_TEMP/lint_errors.txt")
          fi

          if [ "$BUILD_STATUS" = "success" ] && [ "$LINT_STATUS" = "success" ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi

          {
            echo 'build_errors<<EOF'
            echo "$BUILD_ERRORS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          {
            echo 'lint_errors<<EOF'
            echo "$LINT_ERRORS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          echo "build_status=$BUILD_STATUS" >> "$GITHUB_OUTPUT"
          echo "lint_status=$LINT_STATUS" >> "$GITHUB_OUTPUT"

          # Map error line numbers to module names (across all files)
          AFFECTED_MODULES=""
          if [ -f "$RUNNER_TEMP/build_errors.txt" ] || [ -f "$RUNNER_TEMP/lint_errors.txt" ]; then
            for BICEP_FILE in $(find infra/ -name '*.bicep' -not -name '*.bicepparam'); do
              FILE_ERRORS=$(grep "$BICEP_FILE" "$RUNNER_TEMP/build_errors.txt" "$RUNNER_TEMP/lint_errors.txt" 2>/dev/null || true)
              ERROR_LINES=$(echo "$FILE_ERRORS" | grep -ohP '\(\d+,' | grep -oP '\d+' | sort -un)
              MODULE_STARTS=$(grep -n '^module ' "$BICEP_FILE" 2>/dev/null | sed 's/:module \([^ ]*\).*/:\1/')

              for ERR_LINE in $ERROR_LINES; do
                [ -z "$ERR_LINE" ] && continue
                MATCHED_MODULE=""
                MATCHED_START=0
                while IFS=: read -r MOD_LINE MOD_NAME; do
                  if [ "$ERR_LINE" -ge "$MOD_LINE" ] && [ "$MOD_LINE" -ge "$MATCHED_START" ]; then
                    MATCHED_MODULE="$MOD_NAME"
                    MATCHED_START=$MOD_LINE
                  fi
                done <<< "$MODULE_STARTS"
                if [ -n "$MATCHED_MODULE" ]; then
                  AFFECTED_MODULES="$AFFECTED_MODULES $MATCHED_MODULE"
                fi
              done
            done
            AFFECTED_MODULES=$(echo "$AFFECTED_MODULES" | tr ' ' '\n' | sort -u | grep -v '^$' | tr '\n' ',' | sed 's/,$//')
          fi
          echo "affected_modules=$AFFECTED_MODULES" >> "$GITHUB_OUTPUT"



      - name: Create Pull Request
        id: create-pr
        if: steps.check.outputs.updates_found == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: update AVM Bicep module versions"
          branch: "chore/avm-module-updates"
          title: "chore: Update AVM Bicep module versions"
          body: ${{ steps.check.outputs.pr_body }}
          labels: |
            dependencies
            bicep
          delete-branch: true

      - name: Set Bicep Validate status on PR
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RESULT="${{ steps.validation.outputs.result }}"
          if [ "$RESULT" = "success" ]; then
            STATE="success"
            DESC="Bicep build and lint passed"
          else
            STATE="failure"
            DESC="Bicep validation failed — manual intervention required"
          fi
          gh api repos/${{ github.repository }}/statuses/${{ steps.create-pr.outputs.pull-request-head-sha }} \
            -f state="$STATE" \
            -f context="Bicep Build & Lint" \
            -f description="$DESC" \
            -f target_url="$GITHUB_SERVER_URL/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Post validation comment on PR
        if: steps.create-pr.outputs.pull-request-number
        uses: actions/github-script@v8
        env:
          RUNNER_TEMP: ${{ runner.temp }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const runnerTemp = process.env.RUNNER_TEMP;
            const prNumber = ${{ steps.create-pr.outputs.pull-request-number }};
            const result = '${{ steps.validation.outputs.result }}';
            const buildStatus = '${{ steps.validation.outputs.build_status }}';
            const lintStatus = '${{ steps.validation.outputs.lint_status }}';

            const affectedModules = '${{ steps.validation.outputs.affected_modules }}';

            // Strip runner workspace path prefix for cleaner output
            const stripPath = (s) => s.replace(/\/home\/runner\/work\/[^/]+\/[^/]+\//g, '');

            let buildErrors = '';
            try { buildErrors = stripPath(fs.readFileSync(path.join(runnerTemp, 'build_errors.txt'), 'utf8').trim()); } catch {}
            let lintErrors = '';
            try { lintErrors = stripPath(fs.readFileSync(path.join(runnerTemp, 'lint_errors.txt'), 'utf8').trim()); } catch {}

            const buildIcon = buildStatus === 'success' ? 'Passed' : 'Failed';
            const lintIcon = lintStatus === 'success' ? 'Passed' : 'Failed';
            const heading = result === 'success'
              ? '## Bicep Validation Passed'
              : '## Bicep Validation Failed — Manual Intervention Required';

            const lines = [
              '<!-- bicep-validate-comment -->',
              heading,
              '',
              '| Check | Status |',
              '|-------|--------|',
              `| Bicep Build | ${buildIcon} |`,
              `| Bicep Lint | ${lintIcon} |`,
            ];

            if (affectedModules && result !== 'success') {
              const modules = affectedModules.split(',');
              lines.push('', '### Affected Modules', '');
              modules.forEach(m => lines.push(`- \`${m}\``));
            }

            if (buildErrors) {
              lines.push('', '### Build Errors', '', '```', buildErrors, '```');
            }
            if (lintErrors) {
              lines.push('', '### Lint Warnings / Errors', '', '```', lintErrors, '```');
            }
            if (result !== 'success') {
              lines.push('', '> **Note:** The updated module versions introduced breaking changes that need to be resolved manually before this PR can be merged.');
            }

            lines.push('', `Validated at \`${new Date().toISOString()}\` by [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`);

            const body = lines.join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            const marker = '<!-- bicep-validate-comment -->';
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });
            }
